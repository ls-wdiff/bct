name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.7
          chmod +x gradlew

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks

          BUILD_TOOLS_DIR="$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)"

          $BUILD_TOOLS_DIR/zipalign -v 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            /tmp/aligned.apk

          $BUILD_TOOLS_DIR/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out barcodetools.apk \
            /tmp/aligned.apk

          echo "APK signed successfully"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: barcodetools-apk
          path: barcodetools.apk
          retention-days: 30
