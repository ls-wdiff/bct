<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <title>Scan → Barcode</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bwip-js/3.4.0/bwip-js-min.js"></script>
  <style>
    :root {
      --accent: #4fc3f7;
      --green:  #4caf50;
      --red:    #ef5350;
      --amber:  #ffab00;
      --text:   #f0f0f0;
      --muted:  rgba(240,240,240,0.55);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      color: var(--text);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Topbar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
    }

    #topbar-title { font-size: 1rem; font-weight: 700; }

    .mini-toggle { display: flex; align-items: center; gap: 8px; }

    #cr-label { font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; }
    #cr-label.off { color: var(--muted); }

    .pill { position: relative; width: 44px; height: 26px; cursor: pointer; display: block; }
    .pill input { display: none; }
    .pill-track { position: absolute; inset: 0; background: #333; border-radius: 999px; transition: background 0.2s; }
    .pill input:checked ~ .pill-track { background: var(--accent); }
    .pill-thumb { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform 0.2s; pointer-events: none; }
    .pill input:checked ~ .pill-thumb { transform: translateX(18px); }

    /* ── Shoot button ── */
    #shoot-wrap {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }

    #shoot-label {
      display: flex; flex-direction: column; align-items: center; gap: 20px; cursor: pointer;
    }
    #shoot-label input { display: none; }

    .shutter-ring {
      width: 100px; height: 100px; border-radius: 50%;
      border: 3px solid rgba(79,195,247,0.5);
      display: flex; align-items: center; justify-content: center;
    }
    .shutter-inner { width: 76px; height: 76px; border-radius: 50%; background: var(--accent); }

    #shoot-hint { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.02em; }

    /* ── Crop view ── */
    #crop-wrap { position: fixed; inset: 0; z-index: 10; display: none; }
    #photo-canvas  { position: absolute; inset: 0; width: 100%; height: 100%; }
    #overlay-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* ── Bottom bar ── */
    #bottombar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 14px 24px 30px;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.80); backdrop-filter: blur(10px);
    }

    #hint { font-size: 0.78rem; color: var(--muted); text-align: center; }

    /* Small retake button — fixed bottom-left */
    #retake-btn {
      position: fixed;
      bottom: 28px; left: 18px;
      z-index: 25;
      display: none;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* Timer ring — fixed bottom-right */
    #timer-ring {
      position: fixed;
      bottom: 20px; right: 18px;
      z-index: 25;
      display: none;
      width: 52px; height: 52px;
    }

    /* ── Spinner ── */
    #spinner-wrap {
      position: fixed; inset: 0; z-index: 30; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
    }
    .ring { width: 52px; height: 52px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 150px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      z-index: 40;
      background: rgba(18,18,18,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; padding: 10px 22px;
      font-size: 0.82rem; font-weight: 600;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; max-width: 88vw; text-align: center;
    }
    #toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { color: var(--green); }
    #toast.error   { color: var(--red); }
    #toast.warn    { color: var(--amber); }
  </style>
</head>
<body>

<div id="topbar">
  <span id="topbar-title">Scan → Barcode</span>
  <div class="mini-toggle">
    <span id="cr-label" class="on">+CR</span>
    <label class="pill" onclick="event.stopPropagation()">
      <input type="checkbox" id="cr-toggle" checked />
      <div class="pill-track"></div>
      <div class="pill-thumb"></div>
    </label>
  </div>
</div>

<div id="shoot-wrap">
  <label id="shoot-label">
    <input type="file" accept="image/*" capture="environment" id="file-input" />
    <div class="shutter-ring"><div class="shutter-inner"></div></div>
    <span id="shoot-hint">Text 2 Barcode</span>
  </label>
</div>

<div id="crop-wrap">
  <canvas id="photo-canvas"></canvas>
  <canvas id="overlay-canvas"></canvas>
</div>

<div id="bottombar">
  <div id="hint">Drag across the text to select it</div>
</div>

<button id="retake-btn">↩ Retake</button>

<canvas id="timer-ring"></canvas>

<div id="spinner-wrap">
  <div class="ring"></div>
  <p>Reading text…</p>
</div>

<div id="toast"></div>
<canvas id="barcode-canvas" style="display:none"></canvas>

<script>
// ── Elements ──
const fileInput     = document.getElementById('file-input');
const shootWrap     = document.getElementById('shoot-wrap');
const cropWrap      = document.getElementById('crop-wrap');
const photoCanvas   = document.getElementById('photo-canvas');
const overlayCanvas = document.getElementById('overlay-canvas');
const bottombar     = document.getElementById('bottombar');
const hint          = document.getElementById('hint');
const retakeBtn     = document.getElementById('retake-btn');
const timerRing     = document.getElementById('timer-ring');
const spinnerWrap   = document.getElementById('spinner-wrap');
const toastEl       = document.getElementById('toast');
const crToggle      = document.getElementById('cr-toggle');
const crLabel       = document.getElementById('cr-label');
const barcodeCanvas = document.getElementById('barcode-canvas');

const photoCtx   = photoCanvas.getContext('2d');
const overlayCtx = overlayCanvas.getContext('2d');
const ringCtx    = timerRing.getContext('2d');

// ── Tuning constants ──
const Y_OFFSET  = 80;   // px above touch point so finger never hides selection
const H_BIAS    = 1.8;  // horizontal grows faster than vertical
const MIN_DIM   = 20;
const AUTO_MS   = 2000; // ms of inactivity before auto-read

// ── State ──
let photoImg   = null;
let box        = null;
let drawing    = false;
let startX = 0, startY = 0;
let toastTimer = null;
let autoTimer  = null;   // setTimeout handle
let autoStart  = null;   // timestamp when countdown began
let autoRaf    = null;   // requestAnimationFrame handle

// ── Timer ring draw ──
timerRing.width  = 52;
timerRing.height = 52;

function drawRing(fraction) {
  // fraction: 1 = full (just started), 0 = empty (firing)
  ringCtx.clearRect(0, 0, 52, 52);
  // Track
  ringCtx.beginPath();
  ringCtx.arc(26, 26, 20, 0, Math.PI * 2);
  ringCtx.strokeStyle = 'rgba(255,255,255,0.12)';
  ringCtx.lineWidth = 4;
  ringCtx.stroke();
  // Arc — sweeps from top, drains clockwise
  const end = -Math.PI / 2 + (Math.PI * 2 * fraction);
  ringCtx.beginPath();
  ringCtx.arc(26, 26, 20, -Math.PI / 2, end);
  ringCtx.strokeStyle = '#4fc3f7';
  ringCtx.lineWidth = 4;
  ringCtx.lineCap = 'round';
  ringCtx.stroke();
  // Number
  const secs = Math.ceil(AUTO_MS / 1000 * fraction);
  ringCtx.fillStyle = '#f0f0f0';
  ringCtx.font = 'bold 16px system-ui';
  ringCtx.textAlign = 'center';
  ringCtx.textBaseline = 'middle';
  ringCtx.fillText(secs, 26, 27);
}

function animateRing() {
  const elapsed  = Date.now() - autoStart;
  const fraction = Math.max(0, 1 - elapsed / AUTO_MS);
  drawRing(fraction);
  if (fraction > 0) autoRaf = requestAnimationFrame(animateRing);
}

// ── Start / reset auto-read timer ──
function resetAutoTimer() {
  clearTimeout(autoTimer);
  cancelAnimationFrame(autoRaf);
  autoStart = Date.now();
  animateRing();
  autoTimer = setTimeout(() => {
    cancelAnimationFrame(autoRaf);
    drawRing(0);
    doRead();
  }, AUTO_MS);
}

function cancelAutoTimer() {
  clearTimeout(autoTimer);
  cancelAnimationFrame(autoRaf);
  autoTimer = null;
  ringCtx.clearRect(0, 0, 52, 52);
}

// ── CR toggle ──
crToggle.addEventListener('change', () => {
  crLabel.textContent = crToggle.checked ? '+CR' : 'CR off';
  crLabel.className   = crToggle.checked ? 'on'  : 'off';
});

// ── File input ──
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    photoImg = img;
    setupCropView();
    URL.revokeObjectURL(url);
  };
  img.src = url;
  fileInput.value = ''; // allow re-selecting same file after retake
});

// ── Lay out crop view ──
function setupCropView() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  photoCanvas.width    = W;  photoCanvas.height   = H;
  overlayCanvas.width  = W;  overlayCanvas.height = H;

  renderPhoto();

  // Default box: wide strip across the vertical centre
  const bw = W * 0.74;
  const bh = H * 0.09;
  box = { x: (W - bw) / 2, y: (H - bh) / 2, w: bw, h: bh };
  renderOverlay();

  shootWrap.style.display  = 'none';
  cropWrap.style.display   = 'block';
  bottombar.style.display  = 'flex';
  retakeBtn.style.display  = 'block';
  timerRing.style.display  = 'block';

  hint.textContent = 'Drag to adjust · auto-reads in 2s';
  resetAutoTimer();
}

// ── Render photo to fill canvas (cover) ──
function renderPhoto() {
  const W = photoCanvas.width, H = photoCanvas.height;
  const imgR = photoImg.naturalWidth / photoImg.naturalHeight;
  const canR = W / H;
  let sx, sy, sw, sh;
  if (imgR > canR) {
    sh = photoImg.naturalHeight; sw = sh * canR;
    sx = (photoImg.naturalWidth  - sw) / 2; sy = 0;
  } else {
    sw = photoImg.naturalWidth;  sh = sw / canR;
    sx = 0; sy = (photoImg.naturalHeight - sh) / 2;
  }
  photoCtx.drawImage(photoImg, sx, sy, sw, sh, 0, 0, W, H);
}

// ── Render selection overlay ──
function renderOverlay() {
  const W = overlayCanvas.width, H = overlayCanvas.height;
  overlayCtx.clearRect(0, 0, W, H);
  if (!box) return;

  const { x, y, w, h } = box;

  // Dim everything
  overlayCtx.fillStyle = 'rgba(0,0,0,0.55)';
  overlayCtx.fillRect(0, 0, W, H);

  // Reveal selected area
  overlayCtx.clearRect(x, y, w, h);

  // Dashed border
  overlayCtx.strokeStyle = '#4fc3f7';
  overlayCtx.lineWidth   = 2.5;
  overlayCtx.setLineDash([9, 4]);
  overlayCtx.strokeRect(x + 1, y + 1, w - 2, h - 2);
  overlayCtx.setLineDash([]);

  // Corner dots (large — glove friendly)
  overlayCtx.fillStyle = '#4fc3f7';
  [[x, y], [x + w, y], [x, y + h], [x + w, y + h]].forEach(([cx, cy]) => {
    overlayCtx.beginPath();
    overlayCtx.arc(cx, cy, 9, 0, Math.PI * 2);
    overlayCtx.fill();
  });
}

// ── Touch events on overlay canvas ──
overlayCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t    = e.touches[0];
  const rect = overlayCanvas.getBoundingClientRect();
  startX  = t.clientX - rect.left;
  startY  = (t.clientY - rect.top) - Y_OFFSET;
  drawing = true;
  box     = { x: startX, y: startY, w: MIN_DIM, h: MIN_DIM };
  hint.textContent = 'Release when selection looks right';
  resetAutoTimer();
}, { passive: false });

overlayCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing) return;
  const t    = e.touches[0];
  const rect = overlayCanvas.getBoundingClientRect();
  const curX = t.clientX - rect.left;
  const curY = (t.clientY - rect.top) - Y_OFFSET;
  const dx = (curX - startX) * H_BIAS;
  const dy =  curY - startY;
  box = normalizeBox(startX, startY, dx, dy);
  renderOverlay();
  resetAutoTimer();
}, { passive: false });

overlayCanvas.addEventListener('touchend', e => {
  e.preventDefault();
  drawing = false;
  hint.textContent = 'Auto-reads in 2s · drag to reselect';
  resetAutoTimer();
}, { passive: false });

// Mouse fallback (desktop / DeX)
overlayCanvas.addEventListener('mousedown', e => {
  const rect = overlayCanvas.getBoundingClientRect();
  startX = e.clientX - rect.left;
  startY = (e.clientY - rect.top) - Y_OFFSET;
  drawing = true;
  resetAutoTimer();
});
overlayCanvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const rect = overlayCanvas.getBoundingClientRect();
  const dx = (e.clientX - rect.left - startX) * H_BIAS;
  const dy =  e.clientY - rect.top  - startY;
  box = normalizeBox(startX, startY, dx, dy);
  renderOverlay();
  resetAutoTimer();
});
overlayCanvas.addEventListener('mouseup', () => { drawing = false; resetAutoTimer(); });

function normalizeBox(ox, oy, dx, dy) {
  return {
    x: dx >= 0 ? ox : ox + dx,
    y: dy >= 0 ? oy : oy + dy,
    w: Math.max(MIN_DIM, Math.abs(dx)),
    h: Math.max(MIN_DIM, Math.abs(dy))
  };
}

// ── Retake — cancel timer, clear canvas, open camera directly ──
retakeBtn.addEventListener('click', () => {
  cancelAutoTimer();
  box = null; photoImg = null;
  photoCtx.clearRect(0, 0, photoCanvas.width, photoCanvas.height);
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  fileInput.click(); // open camera immediately without going back to shoot screen
});

// ── doRead — called by timer or manually ──
async function doRead() {
  if (!box || !photoImg)           { showToast('Draw a selection first', 'warn');              return; }
  if (!('TextDetector' in window)) { showToast('TextDetector unavailable on this device', 'error'); return; }

  cancelAutoTimer();
  spinnerWrap.style.display = 'flex';

  try {
    const W = photoCanvas.width, H = photoCanvas.height;
    const imgR = photoImg.naturalWidth / photoImg.naturalHeight;
    const canR = W / H;
    let sx, sy, sw, sh;
    if (imgR > canR) {
      sh = photoImg.naturalHeight; sw = sh * canR;
      sx = (photoImg.naturalWidth  - sw) / 2; sy = 0;
    } else {
      sw = photoImg.naturalWidth; sh = sw / canR;
      sx = 0; sy = (photoImg.naturalHeight - sh) / 2;
    }

    const scaleX = sw / W, scaleY = sh / H;
    const cropX  = Math.max(0,      sx + box.x * scaleX);
    const cropY  = Math.max(0,      sy + box.y * scaleY);
    const cropW  = Math.min(sw - (cropX - sx), box.w * scaleX);
    const cropH  = Math.min(sh - (cropY - sy), box.h * scaleY);

    const SCALE = 2;
    const off   = document.createElement('canvas');
    off.width   = cropW * SCALE;
    off.height  = cropH * SCALE;
    off.getContext('2d').drawImage(photoImg, cropX, cropY, cropW, cropH, 0, 0, off.width, off.height);

    const detector = new TextDetector();
    const results  = await detector.detect(off);

    if (!results.length) {
      showToast('No text found — try a tighter crop', 'warn');
      spinnerWrap.style.display = 'none';
      resetAutoTimer(); // restart timer so they can try again
      return;
    }

    generateBarcode(results.map(r => r.rawValue).join(' ').trim());

  } catch (err) {
    spinnerWrap.style.display = 'none';
    showToast('Error: ' + err.message, 'error');
  }
}

// ── Generate barcode ──
function generateBarcode(text) {
  const addCR   = crToggle.checked;
  const payload = addCR ? text + '\r' : text;
  try {
    bwipjs.toCanvas(barcodeCanvas, {
      bcid:            'code128',
      text:            payload,
      scale:           3,
      height:          16,
      includetext:     true,
      textxalign:      'center',
      textfont:        'Helvetica',
      textsize:        12,
      backgroundcolor: 'ffffff',
      alttext:         text,
      paddingwidth:    6,
      paddingheight:   4,
    });
    barcodeCanvas.toBlob(blob => {
      spinnerWrap.style.display = 'none';
      window.open(URL.createObjectURL(blob), '_blank');
      showToast('✔ ' + text + (addCR ? '  +CR' : ''), 'success');
    }, 'image/png');
  } catch (err) {
    spinnerWrap.style.display = 'none';
    showToast('Barcode error: ' + err.message, 'error');
  }
}

// ── Toast ──
function showToast(msg, type = 'success') {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.className   = `show ${type}`;
  toastTimer = setTimeout(() => { toastEl.className = ''; }, 3000);
}

// ── URL param ──
const urlCode = new URLSearchParams(window.location.search).get('code');
if (urlCode?.trim()) window.addEventListener('load', () => generateBarcode(urlCode.trim()));

// ── Service worker ──
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/bct/sw.js').catch(() => {});
</script>
</body>
</html>
