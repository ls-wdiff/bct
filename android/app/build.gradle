plugins {
    id 'com.android.application'
}

android {
    namespace 'com.lswdiff.barcodetools'
    compileSdk 34

    defaultConfig {
        applicationId "com.lswdiff.barcodetools"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            // Signing handled externally by CI
            signingConfig null
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
